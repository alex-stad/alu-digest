name: Test Daily Alu Digest (draft only)

# Manually-triggered test pipeline. Produces a Buttondown draft, does NOT send
# to subscribers, does NOT push to gh-pages, does NOT commit to main.
#
# Use this before merging prompt or code changes to main. Click "Run workflow"
# in the Actions tab, pick the branch you want to test, wait ~12 min, then
# review the draft at https://buttondown.com/emails (Drafts tab).

on:
  workflow_dispatch:
    inputs:
      note:
        description: 'Optional note shown in the run summary (e.g. "testing 6-search prompt")'
        required: false
        default: ''

permissions:
  contents: read  # Test mode reads but never writes back to the repo.

jobs:
  send-draft:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          # We only READ from main's gh-pages history — and in test mode we
          # skip the worktree push entirely — so shallow checkout is fine.
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install "jinja2==3.1.6" "httpx==0.28.1"

      - name: Install Claude Code CLI
        # OAuth bumped to @latest while diagnosing the test-mode auth flow.
        # Once we've confirmed the token path works, repin to a specific version.
        run: npm install -g @anthropic-ai/claude-code@latest

      - name: Run test pipeline (draft-only, no subscribers)
        env:
          # Auth via Claude Max subscription (OAuth token from `claude setup-token`)
          # rather than ANTHROPIC_API_KEY. We deliberately do NOT also pass the API
          # key — if both are set the CLI may prefer the API key, which would
          # silently keep billing pay-as-you-go credits and defeat the test.
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          BUTTONDOWN_API_KEY: ${{ secrets.BUTTONDOWN_API_KEY }}
          TEST_MODE: 'true'  # Picked up by generate_digest.py — Claude's Bash
                             # subshells inherit it, so task_prompt.md's Step 8
                             # invocation runs in test mode automatically.
        run: |
          if [ -z "${CLAUDE_CODE_OAUTH_TOKEN}" ]; then
            echo "ERROR: CLAUDE_CODE_OAUTH_TOKEN secret is not set. Aborting."
            echo "Generate one locally with: claude setup-token"
            exit 1
          fi
          if [ -z "${BUTTONDOWN_API_KEY}" ]; then
            echo "ERROR: BUTTONDOWN_API_KEY secret is not set. Aborting."
            exit 1
          fi

          # ── Token shape diagnostic ─────────────────────────────────────────
          # Reports just numbers and yes/no booleans about the token, never the
          # value itself, so it's safe even if GitHub's masking misses anything.
          # Remove this block once auth is confirmed working.
          echo "── Auth diagnostic ───────────────────────────────"
          echo "  CLI version    : $(claude --version 2>&1 || echo '?')"
          TOKEN_LEN_RAW=$(printf '%s' "${CLAUDE_CODE_OAUTH_TOKEN}" | wc -c | tr -d ' ')
          TOKEN_TRIMMED_LEN=$(printf '%s' "${CLAUDE_CODE_OAUTH_TOKEN}" | sed -e 's/[[:space:]]*$//' | wc -c | tr -d ' ')
          echo "  Token bytes    : ${TOKEN_LEN_RAW}"
          echo "  Trimmed bytes  : ${TOKEN_TRIMMED_LEN}  (mismatch ⇒ trailing whitespace)"
          if printf '%s' "${CLAUDE_CODE_OAUTH_TOKEN}" | grep -q '^sk-ant-oat01-'; then
            echo "  Has oat01 prefix: yes"
          else
            echo "  Has oat01 prefix: NO  (expected sk-ant-oat01-…; got something else)"
          fi
          echo "──────────────────────────────────────────────────"

          PROJECT_ROOT=$(pwd)

          echo "BUTTONDOWN_API_KEY=${BUTTONDOWN_API_KEY}" > .env

          TODAY=$(python3 -c "from datetime import datetime; print(datetime.now().strftime('%A, %d %B %Y'))")
          DATE_SLUG=$(python3 -c "from datetime import datetime; print(datetime.now().strftime('%Y-%m-%d'))")

          echo "── TEST RUN ───────────────────────────────────"
          echo "  Branch:    ${GITHUB_REF_NAME}"
          echo "  Date:      ${TODAY}"
          echo "  Date slug: ${DATE_SLUG}"
          echo "  Note:      ${{ github.event.inputs.note }}"
          echo "  TEST_MODE: ${TEST_MODE} — draft only, no subscribers"
          echo "───────────────────────────────────────────────"

          # Same stream-json summariser as prod, so test runs produce the same
          # turn/token/cost telemetry as a real run.
          _summarise_claude_log() {
            local log="$1"
            [ -s "${log}" ] || { echo "(log empty — no summary)"; return 0; }
            python3 - "${log}" <<'PYEOF'
          import json, sys
          log = sys.argv[1]
          turns = 0
          input_tok = cache_write = cache_read = output_tok = 0
          final_text = ""
          final_result = None
          for line in open(log, encoding="utf-8", errors="replace"):
              line = line.strip()
              if not line or not line.startswith("{"):
                  continue
              try:
                  e = json.loads(line)
              except Exception:
                  continue
              if e.get("type") == "assistant":
                  turns += 1
                  msg = e.get("message", {}) or {}
                  u = msg.get("usage", {}) or {}
                  input_tok += u.get("input_tokens", 0) or 0
                  cache_write += u.get("cache_creation_input_tokens", 0) or 0
                  cache_read += u.get("cache_read_input_tokens", 0) or 0
                  output_tok += u.get("output_tokens", 0) or 0
                  for blk in msg.get("content", []) or []:
                      if blk.get("type") == "text":
                          final_text = blk.get("text", "") or final_text
              elif e.get("type") == "result":
                  final_result = e
          cost = (input_tok*3 + cache_write*3.75 + cache_read*0.30 + output_tok*15) / 1_000_000
          print("─" * 60)
          print(f"Test run summary")
          print(f"  Turns         : {turns}")
          print(f"  Input (fresh) : {input_tok:>9,}")
          print(f"  Cache write   : {cache_write:>9,}")
          print(f"  Cache read    : {cache_read:>9,}")
          print(f"  Output        : {output_tok:>9,}")
          # Flat-rate Max subscription means no per-token charge. We still report
          # the API-equivalent dollar figure so we can track usage trend over time.
          print(f"  API-equiv cost: ${cost:,.2f}  (subscription run — not actually billed)")
          if final_result:
              print(f"  Result        : {final_result.get('subtype', '?')}")
          print("─" * 60)
          if final_text:
              print("Final assistant text:")
              print(final_text[-1500:])
          PYEOF
          }

          CLAUDE_LOG=$(mktemp)
          for attempt in 1 2 3; do
            claude -p "Today's date is: ${TODAY}. Date slug: ${DATE_SLUG}. The project root is: ${PROJECT_ROOT}. Read the file ${PROJECT_ROOT}/task_prompt.md and execute every step in it (Steps 1 through 9) exactly as described. Replace PROJECT_ROOT with ${PROJECT_ROOT} wherever the instructions mention it." \
              --allowedTools "Bash,Read,Write,WebSearch,Glob,Grep" \
              --max-turns 70 \
              --output-format stream-json \
              --verbose \
              --dangerously-skip-permissions 2>&1 | tee "${CLAUDE_LOG}"
            CLAUDE_EXIT=${PIPESTATUS[0]}

            [ ${CLAUDE_EXIT} -eq 0 ] && break

            if grep -qiE "529|overloaded_error|overloaded|rate.?limit|too.?many.?request" "${CLAUDE_LOG}"; then
              [ ${attempt} -eq 3 ] && { echo "All 3 attempts failed (API overloaded). Exiting."; _summarise_claude_log "${CLAUDE_LOG}"; rm -f "${CLAUDE_LOG}"; exit 1; }
              echo "Attempt ${attempt}: API overloaded — retrying in 3 minutes..."
              sleep 180
            else
              echo "Attempt ${attempt} failed (not an overload error — not retrying)."
              _summarise_claude_log "${CLAUDE_LOG}" || true
              rm -f "${CLAUDE_LOG}"
              exit 1
            fi
          done

          _summarise_claude_log "${CLAUDE_LOG}" || true
          rm -f "${CLAUDE_LOG}"

          echo ""
          echo "───────────────────────────────────────────────"
          echo "✓ Test run complete."
          echo "  Draft available at: https://buttondown.com/emails (Drafts tab)"
          echo "  No commit, no push, no subscribers notified."
          echo "───────────────────────────────────────────────"
