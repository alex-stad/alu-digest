name: Daily Alu Digest

on:
  schedule:
    # 05:00 UTC = 07:00 CEST (UTC+2 in summer) / 06:00 CET (UTC+1 in winter)
    - cron: '0 5 * * 1-5'
  workflow_dispatch:  # Allow manual trigger from GitHub Actions UI

permissions:
  contents: write  # Required to push to gh-pages branch and main (JSON dedup)

jobs:
  send-digest:
    runs-on: ubuntu-latest
    timeout-minutes: 25  # smart retry only fires on 529; 70-turn run ≈ 12min + pipeline

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0  # Full history needed for git worktree (gh-pages)

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install "jinja2==3.1.6" "httpx==0.28.1"  # Fix 5: pinned versions

      - name: Configure git identity
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code@2.1.101  # Fix 4: pinned version

      - name: Run Daily Alu Digest (AI pipeline)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BUTTONDOWN_API_KEY: ${{ secrets.BUTTONDOWN_API_KEY }}
        run: |
          # Fix 2: pre-flight checks — fail fast before wasting API credits
          if [ -z "${ANTHROPIC_API_KEY}" ]; then
            echo "ERROR: ANTHROPIC_API_KEY secret is not set. Aborting."
            exit 1
          fi
          if [ -z "${BUTTONDOWN_API_KEY}" ]; then
            echo "ERROR: BUTTONDOWN_API_KEY secret is not set. Aborting."
            exit 1
          fi

          PROJECT_ROOT=$(pwd)

          # Write .env so generate_digest.py can load it
          echo "BUTTONDOWN_API_KEY=${BUTTONDOWN_API_KEY}" > .env

          # Fix 6: pre-compute both date strings before Claude runs so they are
          # consistent across the entire job (guards against midnight crossing).
          # Shell date is always correct; Claude's day-of-week arithmetic is not.
          TODAY=$(python3 -c "from datetime import datetime; print(datetime.now().strftime('%A, %d %B %Y'))")
          DATE_SLUG=$(python3 -c "from datetime import datetime; print(datetime.now().strftime('%Y-%m-%d'))")

          # Run Claude — retry ONLY on 529/overloaded errors, not on turn-limit or task failures.
          # Retrying a turn-limit failure wastes a full run's worth of API credits for no benefit.
          CLAUDE_LOG=$(mktemp)
          for attempt in 1 2 3; do
            claude -p "Today's date is: ${TODAY}. Date slug: ${DATE_SLUG}. The project root is: ${PROJECT_ROOT}. Read the file ${PROJECT_ROOT}/task_prompt.md and execute every step in it (Steps 1 through 9) exactly as described. Replace PROJECT_ROOT with ${PROJECT_ROOT} wherever the instructions mention it." \
              --allowedTools "Bash,Read,Write,WebSearch,WebFetch,Glob,Grep" \
              --max-turns 70 \
              --dangerously-skip-permissions 2>&1 | tee "${CLAUDE_LOG}"
            CLAUDE_EXIT=${PIPESTATUS[0]}

            [ ${CLAUDE_EXIT} -eq 0 ] && break

            if grep -qiE "529|overloaded_error|overloaded|rate.?limit|too.?many.?request" "${CLAUDE_LOG}"; then
              [ ${attempt} -eq 3 ] && { echo "All 3 attempts failed (API overloaded). Exiting."; rm -f "${CLAUDE_LOG}"; exit 1; }
              echo "Attempt ${attempt}: API overloaded — retrying in 3 minutes..."
              sleep 180
            else
              echo "Attempt ${attempt} failed (not an overload error — not retrying)."
              rm -f "${CLAUDE_LOG}"
              exit 1
            fi
          done
          rm -f "${CLAUDE_LOG}"

          # Commit today's digest JSON and updated dedup_history.json back to main.
          # Fix 8: pull --rebase before push to handle any concurrent push to main.
          JSON_FILE="output/digest_${DATE_SLUG}.json"
          DEDUP_FILE="output/dedup_history.json"
          if [ -f "${JSON_FILE}" ]; then
            git pull --rebase origin main
            git add "${JSON_FILE}"
            [ -f "${DEDUP_FILE}" ] && git add "${DEDUP_FILE}"
            git diff --cached --quiet || git commit -m "Add digest ${DATE_SLUG}: JSON + dedup history"
            git push origin main
          else
            echo "Warning: ${JSON_FILE} not found — skipping commit"
          fi
