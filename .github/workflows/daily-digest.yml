name: Daily Alu Digest

on:
  schedule:
    # 05:00 UTC = 07:00 CEST (UTC+2 in summer) / 06:00 CET (UTC+1 in winter)
    - cron: '0 5 * * 1-5'
  workflow_dispatch:  # Allow manual trigger from GitHub Actions UI

permissions:
  contents: write  # Required to push to gh-pages branch and main (JSON dedup)

jobs:
  send-digest:
    runs-on: ubuntu-latest
    timeout-minutes: 45  # Apr-17 run was 19m34s; 45min gives real headroom without
                         # letting a hang run forever. max-turns 70 is the inner cap.

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0  # Full history needed for git worktree (gh-pages)

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install "jinja2==3.1.6" "httpx==0.28.1"  # Fix 5: pinned versions

      - name: Configure git identity
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code@2.1.101  # Fix 4: pinned version

      - name: Run Daily Alu Digest (AI pipeline)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BUTTONDOWN_API_KEY: ${{ secrets.BUTTONDOWN_API_KEY }}
        run: |
          # Fix 2: pre-flight checks — fail fast before wasting API credits
          if [ -z "${ANTHROPIC_API_KEY}" ]; then
            echo "ERROR: ANTHROPIC_API_KEY secret is not set. Aborting."
            exit 1
          fi
          if [ -z "${BUTTONDOWN_API_KEY}" ]; then
            echo "ERROR: BUTTONDOWN_API_KEY secret is not set. Aborting."
            exit 1
          fi

          PROJECT_ROOT=$(pwd)

          # Write .env so generate_digest.py can load it
          echo "BUTTONDOWN_API_KEY=${BUTTONDOWN_API_KEY}" > .env

          # Fix 6: pre-compute both date strings before Claude runs so they are
          # consistent across the entire job (guards against midnight crossing).
          # Shell date is always correct; Claude's day-of-week arithmetic is not.
          TODAY=$(python3 -c "from datetime import datetime; print(datetime.now().strftime('%A, %d %B %Y'))")
          DATE_SLUG=$(python3 -c "from datetime import datetime; print(datetime.now().strftime('%Y-%m-%d'))")

          # Parses the stream-json log and prints turn count, token totals, and an
          # approximate $ cost — so we can see trend over time and catch regressions
          # without loading Anthropic's billing dashboard.
          _summarise_claude_log() {
            local log="$1"
            [ -s "${log}" ] || { echo "(log empty — no summary)"; return 0; }
            python3 - "${log}" <<'PYEOF'
          import json, sys
          log = sys.argv[1]
          turns = 0
          input_tok = cache_write = cache_read = output_tok = 0
          final_text = ""
          final_result = None
          for line in open(log, encoding="utf-8", errors="replace"):
              line = line.strip()
              if not line or not line.startswith("{"):
                  continue
              try:
                  e = json.loads(line)
              except Exception:
                  continue
              if e.get("type") == "assistant":
                  turns += 1
                  msg = e.get("message", {}) or {}
                  u = msg.get("usage", {}) or {}
                  input_tok += u.get("input_tokens", 0) or 0
                  cache_write += u.get("cache_creation_input_tokens", 0) or 0
                  cache_read += u.get("cache_read_input_tokens", 0) or 0
                  output_tok += u.get("output_tokens", 0) or 0
                  for blk in msg.get("content", []) or []:
                      if blk.get("type") == "text":
                          final_text = blk.get("text", "") or final_text
              elif e.get("type") == "result":
                  final_result = e
          # Sonnet 4.5 pricing: $3/$15 per MTok in/out, cache write 1.25x, cache read 0.1x
          cost = (input_tok*3 + cache_write*3.75 + cache_read*0.30 + output_tok*15) / 1_000_000
          print("─" * 60)
          print(f"Claude run summary")
          print(f"  Turns         : {turns}")
          print(f"  Input (fresh) : {input_tok:>9,}")
          print(f"  Cache write   : {cache_write:>9,}")
          print(f"  Cache read    : {cache_read:>9,}")
          print(f"  Output        : {output_tok:>9,}")
          print(f"  Est. cost     : ${cost:,.2f}")
          if final_result:
              print(f"  Result        : {final_result.get('subtype', '?')}")
          print("─" * 60)
          if final_text:
              print("Final assistant text:")
              print(final_text[-1500:])
          PYEOF
          }

          # Run Claude — retry ONLY on 529/overloaded errors, not on turn-limit or task failures.
          # Retrying a turn-limit failure wastes a full run's worth of API credits for no benefit.
          #
          # --output-format stream-json --verbose: emits one JSON event per turn so we can
          #   see per-turn token usage, which tool was called, and where a run actually ends.
          #   Without this, a killed run leaves 25+ min of empty log (as happened on 2026-04-20).
          #
          # --allowedTools: WebFetch removed — Step 1 explicitly forbids fetching full article
          #   pages (snippets only), and Step 5's ECDP fallback goes straight to carryforward
          #   if the TradingView scanner API fails. Blocking WebFetch at the tool layer
          #   prevents accidental 5-20k token page-dumps that persist across all remaining turns.
          CLAUDE_LOG=$(mktemp)
          for attempt in 1 2 3; do
            claude -p "Today's date is: ${TODAY}. Date slug: ${DATE_SLUG}. The project root is: ${PROJECT_ROOT}. Read the file ${PROJECT_ROOT}/task_prompt.md and execute every step in it (Steps 1 through 9) exactly as described. Replace PROJECT_ROOT with ${PROJECT_ROOT} wherever the instructions mention it." \
              --allowedTools "Bash,Read,Write,WebSearch,Glob,Grep" \
              --max-turns 70 \
              --output-format stream-json \
              --verbose \
              --dangerously-skip-permissions 2>&1 | tee "${CLAUDE_LOG}"
            CLAUDE_EXIT=${PIPESTATUS[0]}

            [ ${CLAUDE_EXIT} -eq 0 ] && break

            if grep -qiE "529|overloaded_error|overloaded|rate.?limit|too.?many.?request" "${CLAUDE_LOG}"; then
              [ ${attempt} -eq 3 ] && { echo "All 3 attempts failed (API overloaded). Exiting."; _summarise_claude_log "${CLAUDE_LOG}"; rm -f "${CLAUDE_LOG}"; exit 1; }
              echo "Attempt ${attempt}: API overloaded — retrying in 3 minutes..."
              sleep 180
            else
              echo "Attempt ${attempt} failed (not an overload error — not retrying)."
              _summarise_claude_log "${CLAUDE_LOG}" || true
              rm -f "${CLAUDE_LOG}"
              exit 1
            fi
          done

          # Human-readable summary of the stream-json log: turn count, token usage,
          # estimated cost, and the final assistant text. Always runs after success,
          # so we can track token-spend trend over time.
          _summarise_claude_log "${CLAUDE_LOG}" || true
          rm -f "${CLAUDE_LOG}"

          # Commit today's digest JSON and updated dedup_history.json back to main.
          #
          # Order matters: stage + commit FIRST, then pull --rebase. Reason:
          # `generate_digest.py` rewrites the tracked file output/dedup_history.json,
          # which leaves the working tree dirty. `git pull --rebase` refuses on a
          # dirty tree with "cannot pull with rebase: You have unstaged changes"
          # (exit 128), which is what killed run 24664454770 on 2026-04-20.
          # Committing first moves those changes into HEAD so the rebase sees a
          # clean worktree; any concurrent main-branch commits get replayed under
          # our new commit.
          JSON_FILE="output/digest_${DATE_SLUG}.json"
          DEDUP_FILE="output/dedup_history.json"
          if [ -f "${JSON_FILE}" ]; then
            git add "${JSON_FILE}"
            [ -f "${DEDUP_FILE}" ] && git add "${DEDUP_FILE}"
            if git diff --cached --quiet; then
              echo "No changes staged — skipping commit/push."
            else
              git commit -m "Add digest ${DATE_SLUG}: JSON + dedup history"
              git pull --rebase origin main
              git push origin main
            fi
          else
            echo "Warning: ${JSON_FILE} not found — skipping commit"
          fi
