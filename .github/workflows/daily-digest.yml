name: Daily Alu Digest

on:
  schedule:
    # 06:00 UTC = 07:00 CET (UTC+1) / 08:00 CEST (UTC+2 in summer)
    - cron: '0 5 * * 1-5'
  workflow_dispatch:  # Allow manual trigger from GitHub Actions UI

permissions:
  contents: write  # Required to push to gh-pages branch

jobs:
  send-digest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0  # Full history needed for git worktree (gh-pages)

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install jinja2 httpx

      - name: Configure git identity
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Run Daily Alu Digest (AI pipeline)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BUTTONDOWN_API_KEY: ${{ secrets.BUTTONDOWN_API_KEY }}
        run: |
          PROJECT_ROOT=$(pwd)

          # Write .env so generate_digest.py can load it
          echo "BUTTONDOWN_API_KEY=${BUTTONDOWN_API_KEY}" > .env

          # Pre-compute today's date — shell date is always correct, Claude's
          # day-of-week arithmetic is not reliable
          TODAY=$(python3 -c "from datetime import datetime; print(datetime.now().strftime('%A, %d %B %Y'))")

          # Run Claude with up to 3 attempts to handle transient API overload (529 errors)
          for attempt in 1 2 3; do
            claude -p "Today's date is: ${TODAY}. The project root is: ${PROJECT_ROOT}. Read the file ${PROJECT_ROOT}/task_prompt.md and execute every step in it (Steps 1 through 9) exactly as described. Replace PROJECT_ROOT with ${PROJECT_ROOT} wherever the instructions mention it." \
              --allowedTools "Bash,Read,Write,WebSearch,Glob,Grep" \
              --max-turns 90 \
              --dangerously-skip-permissions && break
            [ $attempt -eq 3 ] && { echo "All 3 attempts failed. Exiting."; exit 1; }
            echo "Attempt ${attempt} failed — retrying in 3 minutes..."
            sleep 180
          done

          # Commit today's digest JSON back to main so future runs can use it for dedup.
          # Without this, the output/ folder on main stays stale and the dedup check
          # never sees recent digests.
          DATE_SLUG=$(python3 -c "from datetime import datetime; print(datetime.now().strftime('%Y-%m-%d'))")
          JSON_FILE="output/digest_${DATE_SLUG}.json"
          if [ -f "${JSON_FILE}" ]; then
            git add "${JSON_FILE}"
            git diff --cached --quiet || git commit -m "Add digest JSON ${DATE_SLUG} for dedup history"
            git push origin main
          else
            echo "Warning: ${JSON_FILE} not found — skipping JSON commit"
          fi
